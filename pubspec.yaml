name: birdcherry
description: "BirdCherry — social birdwatching. Collect, map and share the birds you see."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  google_fonts: ^6.2.1
  http: ^1.2.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  flutter_svg: ^2.0.17
  local_auth: ^2.3.0
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo/

# Generated with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FBF8F2"
